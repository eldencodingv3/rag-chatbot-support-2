<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudSync Pro - Support Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>CloudSync Pro Support</h1>
      <p>Ask me anything about CloudSync Pro</p>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot-message">
        <div class="message-content">
          Hi! I'm the CloudSync Pro support assistant. How can I help you today?
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <form id="chatForm">
        <input type="text" id="messageInput" placeholder="Type your question..." autocomplete="off" required>
        <button type="submit" id="sendBtn">Send</button>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
